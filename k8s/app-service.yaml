apiVersion: v1
kind: Service
metadata:
  name: namegen
  namespace: namegen
  labels:
    app.kubernetes.io/name: namegen
    app.kubernetes.io/part-of: namegen-devops-project
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: namegen
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
