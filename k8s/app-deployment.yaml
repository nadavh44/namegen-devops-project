apiVersion: apps/v1
kind: Deployment
metadata:
  name: namegen
  namespace: namegen
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: namegen
  template:
    metadata:
      labels:
        app.kubernetes.io/name: namegen
        app.kubernetes.io/part-of: namegen-devops-project
    spec:
      containers:
        - name: namegen
          image: 380648615517.dkr.ecr.us-west-2.amazonaws.com/namegen:manual
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongodb-url
            - name: DB_NAME
              value: namegen
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi